<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="result-box">
    <h1>🎯 Your Score</h1>
    <h2>{{ score }} / {{ total }}</h2>

    <p>
        {% if score == total %}
            Excellent 🔥
        {% elif score > 0 %}
            Good attempt 👍
        {% else %}
            Needs improvement 💪
        {% endif %}
    </p>

    <a href="/" class="btn">Go Home</a>
</div>

</body>
</html>

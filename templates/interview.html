<!DOCTYPE html>
<html>
<head>
    <title>Interview</title>
</head>
<body>

<h2>{{ category.upper() }} Interview</h2>

<form method="POST">
    {% for q in questions %}
        <p>{{ loop.index }}. {{ q.q }}</p>
        <input type="text" name="answers" required><br><br>
    {% endfor %}

    <button type="submit">Submit</button>
</form>

</body>
</html>
